<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#0a0e1a"/>
  <!-- Outer glow ring -->
  <circle cx="96" cy="96" r="82" fill="none" stroke="#63b3ed" stroke-width="3" opacity="0.4"/>
  <!-- Grid lines -->
  <line x1="96" y1="14" x2="96" y2="178" stroke="#63b3ed" stroke-width="1" opacity="0.1"/>
  <line x1="14" y1="96" x2="178" y2="96" stroke="#63b3ed" stroke-width="1" opacity="0.1"/>
  <!-- Connection lines from center to satellites -->
  <line x1="96" y1="96" x2="96" y2="36" stroke="#63b3ed" stroke-width="2" opacity="0.6"/>
  <line x1="96" y1="96" x2="148" y2="96" stroke="#63b3ed" stroke-width="2" opacity="0.6"/>
  <line x1="96" y1="96" x2="96" y2="156" stroke="#63b3ed" stroke-width="2" opacity="0.6"/>
  <line x1="96" y1="96" x2="44" y2="96" stroke="#63b3ed" stroke-width="2" opacity="0.6"/>
  <!-- Satellite nodes -->
  <circle cx="96" cy="36" r="12" fill="#68d391" opacity="0.9"/>
  <circle cx="148" cy="96" r="12" fill="#68d391" opacity="0.9"/>
  <circle cx="96" cy="156" r="12" fill="#68d391" opacity="0.9"/>
  <circle cx="44" cy="96" r="12" fill="#68d391" opacity="0.9"/>
  <!-- Center node -->
  <circle cx="96" cy="96" r="22" fill="#0f1628"/>
  <circle cx="96" cy="96" r="22" fill="none" stroke="#63b3ed" stroke-width="2.5"/>
  <circle cx="96" cy="96" r="14" fill="#63b3ed"/>
  <!-- Center glow -->
  <circle cx="96" cy="96" r="22" fill="none" stroke="#63b3ed" stroke-width="8" opacity="0.15"/>
</svg>
